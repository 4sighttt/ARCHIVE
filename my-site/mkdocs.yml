site_name: ARCHIVE
site_url: https://4sighttt.github.io/ARCHIVE/

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  font: false

  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: night

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: sunny
  
plugins:
  - search
  - awesome-pages

markdown_extensions:
  - nl2br

extra_css:
  - stylesheets/extra.css
