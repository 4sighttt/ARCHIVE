site_name: ARCHIVE

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  font: false

  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  
plugins:
  - search
  - awesome-pages
  - blogging

markdown_extensions:
  - nl2br

extra_css:
  - stylesheets/extra.css
